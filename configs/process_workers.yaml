version: 1
name: Hermes Retek Process Workers

principles:
  supervisor_is_only_state_owner: true
  bot1_bot2_direct_chat_forbidden: true
  single_writer_for_external_state: true
  discovery_and_verification_can_parallelize: true
  deployment_requires_approval: true
  skills_selected_by_manifest_before_worker_run: true

bounded_parallel_orchestration:
  enabled: true
  max_parallel_agents_by_level:
    L0: 0
    L1: 0
    L2: 0
    L3: 3
    L4: 5
  verification_parallel_agents_default: 3
  per_agent_timeout_seconds_by_level:
    L2: 60
    L3: 120
    L4: 150
  per_agent_token_budget_by_level:
    L2: 700
    L3: 900
    L4: 1200
  isolated_workspace:
    root: /opt/data/agent_workspaces
    mode: isolated_copy_on_write
    merge_owner: supervisor
    agent_writes_to_shared_workspace: false
  state_and_sqlite:
    single_writer: supervisor
    sqlite_single_writer: true
    agent_state_writes_allowed: false
    write_queue: supervisor_tool_gateway
    lock_scope:
      - process_id
      - target_resource
  bothub_rate_limits:
    max_parallel_calls: 2
    requests_per_minute: 12
    cooldown_ms: 250
  forbidden_parallel_phases:
    - execution
    - approval
    - state_transition

workers:
  router:
    process: task_router
    writes_state: false
    output:
      - task_level
      - task_type
      - risk_level
      - process_plan
      - review_required
      - skill_context

  supervisor:
    process: process_orchestrator
    writes_state: true
    owns:
      - task_id
      - phase
      - approval_state
      - human_decision
      - final_status
      - skill_context

  architect:
    process: architect_worker
    writes_state: false
    output:
      - acceptance_contract
      - risks
      - execution_plan

  bot1:
    process: bot1_worker
    provider_class: deepseek
    default_model: deepseek-v4-flash
    skill_context_source: skills/manifest.json
    writes_state: false
    output:
      - implementation_result
      - changed_files
      - tests
      - evidence

  tester:
    process: tester_worker
    skill_context_source: skills/manifest.json
    writes_state: false
    output:
      - test_commands
      - test_exit_codes
      - test_summary

  bot2:
    process: bot2_worker
    provider_class: codex
    default_model: gpt-5.3-codex
    skill_context_source: skills/manifest.json
    writes_state: false
    input_contract:
      - task
      - acceptance_contract
      - bot1_result
      - evidence
      - risk_level
    output:
      - verdict_status
      - risks
      - required_fixes
      - confidence

  devops:
    process: devops_worker
    skill_context_source: skills/manifest.json
    writes_state: false
    blocked_until:
      - approved
      - accepted_by_user_override

skill_library:
  manifest: skills/manifest.json
  selector: scripts/skill_index.py
  runtime_hook: scripts/process_orchestrator.py
  selection_policy: lazy_by_task_level_role_and_tags
  active_skills_are_attached_to:
    - route.skill_context
    - process_events.skill_context_selected
    - process_assignments.output.skills
  approval_required_skills:
    mode: gated_until_human_decision
    requires_tool_gateway: true

levels:
  L0:
    process_plan:
      - router
      - supervisor
    bot2_required: false
  L1:
    process_plan:
      - router
      - supervisor
      - bot1
    bot2_required: false
  L2:
    process_plan:
      - router
      - supervisor
      - bot1
      - tester
      - bot2_light_if_risky
    bot2_required: conditional
  L3:
    process_plan:
      - router
      - supervisor
      - architect
      - bot1
      - tester
      - bot2
    bot2_required: true
  L4:
    process_plan:
      - router
      - supervisor
      - architect
      - bot1
      - tester
      - bot2
      - devops_if_approved
    bot2_required: true

human_decision:
  yes:
    label: "Да"
    meaning: "Согласен с Bot#2, вернуть Bot#1 на исправление"
    supervisor_status: return_to_bot1
  no:
    label: "Нет"
    meaning: "Отклонить возражение Bot#2 и принять работу Bot#1 как есть"
    supervisor_status: accepted_by_user_override
