server_observability_llm_failure_logging:
  version: 1
  enabled: true

  correlation:
    required_fields:
      - trace_id
      - task_id
      - task_type
      - phase
      - provider
      - model
      - request_id
    missing_required_field_status: OBSERVABILITY_EVENT_INCOMPLETE

  log_files:
    base_dir: /opt/data/hermes/logs
    jsonl:
      runtime: hermes-runtime.jsonl
      llm_requests: llm-requests.jsonl
      tool_calls: tool-calls.jsonl
      failures: failures.jsonl
      audit: audit.jsonl
    rotation:
      enabled: true
      max_file_mb: 100
      keep_days: 14
      compress_old_logs: true

  storage:
    jsonl_on_disk: true
    sqlite_or_postgres_index: true
    index_by:
      - task_id
      - trace_id
      - provider
      - model
      - error_type
      - phase
      - created_at

  task_lifecycle_events:
    log:
      - task_created
      - phase_changed
      - plan_ready
      - user_approval_received
      - execution_started
      - verification_started
      - final_report_sent
      - task_failed
    fields:
      - task_id
      - task_type
      - safe_user_alias
      - previous_phase
      - next_phase
      - trigger
      - supervisor_decision
      - timestamp

  llm_request_logging:
    before_request:
      log:
        - provider
        - model
        - base_url_host
        - request_id
        - trace_id
        - task_id
        - phase
        - prompt_token_estimate
        - max_tokens
        - timeout_seconds
        - stream
        - fallback_chain
    after_response:
      log:
        - status
        - latency_ms
        - input_tokens
        - output_tokens
        - cost
        - finish_reason
        - provider_request_id
        - truncated

  llm_failure_logging:
    enabled: true
    error_types:
      - LLM_TIMEOUT
      - LLM_STREAM_DISCONNECT
      - LLM_RATE_LIMIT
      - LLM_AUTH_ERROR
      - LLM_PROVIDER_5XX
      - LLM_PROVIDER_4XX
      - LLM_CONTEXT_LENGTH
      - LLM_EMPTY_RESPONSE
      - LLM_BAD_JSON
      - LLM_NETWORK_ERROR
      - LLM_UNKNOWN_ERROR
    fields:
      - error_type
      - error_message_sanitized
      - http_status
      - provider_error_code
      - retry_count
      - will_retry
      - fallback_selected
      - checkpoint_saved
      - last_successful_phase
      - resume_possible

  tool_call_logging:
    enabled: true
    fields:
      - tool_name
      - normalized_args_hash
      - task_id
      - phase
      - allowed_by_tool_gateway
      - duplicate_fingerprint
      - started_at
      - finished_at
      - status
      - stdout_tail_safe
      - stderr_tail_safe
      - exit_code
      - affected_resource

  fallback_logging:
    enabled: true
    fields:
      - primary_provider
      - primary_model
      - failure_type
      - fallback_provider
      - fallback_model
      - fallback_reason
      - user_notified
      - task_resumed_from_checkpoint

  checkpoint_policy:
    before_risky_llm_call: true
    before_external_write_action: true
    checkpoint_fields:
      - task_id
      - phase
      - current_plan
      - execution_checklist
      - completed_steps
      - evidence_cache_keys
      - last_tool_result
      - next_intended_step
    on_llm_failure:
      save_failure_log: true
      save_checkpoint: true
      resume_from_last_safe_step: true
      do_not_restart_discovery_by_default: true

  retry_policy:
    LLM_TIMEOUT:
      max_retries: 2
      fallback_after_retries: true
    LLM_STREAM_DISCONNECT:
      max_retries: 2
      fallback_after_retries: true
    LLM_NETWORK_ERROR:
      max_retries: 2
      fallback_after_retries: true
    LLM_RATE_LIMIT:
      max_retries: 2
      backoff: exponential
      fallback_after_retries: true
    LLM_AUTH_ERROR:
      max_retries: 0
      fallback_after_retries: false
      alert_immediately: true
    LLM_CONTEXT_LENGTH:
      max_retries: 0
      action: split_task_or_summarize_checkpoint
    LLM_BAD_JSON:
      max_retries: 1
      action: json_repair_attempt
    LLM_PROVIDER_5XX:
      max_retries: 2
      fallback_after_retries: true
    LLM_PROVIDER_4XX:
      max_retries: 0
      alert_immediately: true

  telegram_alerts:
    enabled: true
    channel: hermes_runtime_alerts
    alert_on:
      - LLM_AUTH_ERROR
      - LLM_STREAM_DISCONNECT
      - LLM_TIMEOUT_AFTER_RETRIES
      - FALLBACK_ACTIVATED
      - CHECKPOINT_SAVE_FAILED
      - TASK_RESUME_FAILED
    message_must_include:
      - event
      - task_id
      - phase
      - provider
      - model
      - error_type
      - retry
      - fallback
      - checkpoint
      - resume_possible
      - action

  redaction:
    enabled: true
    never_log:
      - api_keys
      - authorization_headers
      - ssh_private_keys
      - raw_env
      - full_personal_data
      - full_commercial_documents
      - full_prompt_with_secrets
    log_instead:
      - sanitized_preview
      - sha256_hash
      - host_only_url

  loop_guard_integration:
    llm_failure_must_not_reset_phase_to_discovery: true
    continue_from_checkpoint_if_possible: true
    discovery_restart_requires_reason:
      - evidence_expired
      - input_changed
      - verification_contradiction
      - explicit_user_request
